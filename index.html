<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111111">
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="manifest" href="css/site.webmanifest">
  <title>股市儀表板</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-light">
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h4 m-0"><span class="small"><i class="bi bi-graph-up-arrow me-2 text-dark"></i></span>股市資訊</h1>
      <span class="badge text-bg-dark">Finance Dashboard</span>
    </div>

    <div class="row g-3">
      <div class="col-12 col-lg-4">
        <div class="card shadow-sm border-0 h-100">
          <div class="card-body d-flex flex-column">
            <h2 class="h6 text-muted mb-3">每日股價</h2>
            <div id="stock" class="small mb-3">載入中...</div>
            <div class="input-group mt-auto">
              <input type="text" class="form-control" placeholder="新增股票">
              <button class="btn btn-outline-secondary" type="button" id="addStock"><i class="bi bi-search"></i></button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-8">
        <div class="card shadow-sm border-0 h-100">
          <div class="card-body">
            <h2 class="h6 text-muted mb-3">歷年走勢圖</h2>
            <canvas id="stockChart" height="120"></canvas>
          </div>
        </div>
      </div>

      <div class="col-12">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h2 class="h6 text-muted mb-3">每日市場財經重點</h2>
            <div id="marketHighlights" class="row g-2"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
